multi_advisor_protocols:
  board_meeting:
    description: "Full board deliberation on a complex strategic question"
    process:
      - "Board Chair frames the question and context"
      - "Each relevant advisor provides their perspective (2-4 advisors)"
      - "Board Chair identifies tensions and complementarities"
      - "Synthesis: areas of agreement, productive disagreements, recommended path"
      - "Clear next steps with accountability"
  thinking_council:
    advisors: [charlie-munger, keith-cunningham, naval-ravikant]
    use_when: "Major strategic decision requiring deep thinking and risk analysis"
  behavior_lab:
    advisors: [marshall-goldsmith, bj-fogg, dan-sullivan]
    use_when: "Installing behavioral change in the entrepreneur or their team"
  operations_council:
    advisors: [gino-wickman, patrick-lencioni, keith-cunningham]
    use_when: "Business needs a system overhaul — processes, team, accountability"
  founder_council:
    advisors: [naval-ravikant, derek-sivers, dan-sullivan]
    use_when: "Founder at crossroads — life-business alignment, values, next chapter"
  contrarian_panel:
    advisors: [charlie-munger, derek-sivers, keith-cunningham]
    use_when: "Conventional wisdom seems wrong, need dissenting views"

config:
  extends: extend
